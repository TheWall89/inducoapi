version: '3'

tasks:
  install:
    desc: Install project dependencies
    cmds:
      - poetry install

  dev:
    desc: Install project dependencies including the dev group
    cmds:
      - poetry install --with=dev --no-root

  test:
    desc: Run unit tests
    deps: [dev]
    cmds:
      - poetry run pytest

  release:branch:
    desc: 'Bump version, create a release branch. Usage: task release:branch VERSION=2.1.14'
    preconditions:
      - sh: '[ -n "{{.VERSION}}" ]'
        msg: "VERSION is required, e.g. task release:branch VERSION=2.1.14"
      - sh: git diff --quiet && git diff --cached --quiet
        msg: "Working tree is not clean, commit or stash your changes first"
      - sh: '[ "$(git branch --show-current)" = "master" ]'
        msg: "You must be on master to cut a release branch"
    cmds:
      - git pull origin master
      - git checkout -b release-{{.VERSION}}
      - sed -i 's/^version = ".*"/version = "{{.VERSION}}"/' pyproject.toml
      - sed -i 's/^__version__ = ".*"/__version__ = "{{.VERSION}}"/' inducoapi/__init__.py
      - git add pyproject.toml inducoapi/__init__.py
      - git commit -m "Bump version to {{.VERSION}}"
      - git push -u origin release-{{.VERSION}}

  release:tag:
    desc: 'Tag master with a new version and push the tag. Run this AFTER the release PR is merged. Usage: task release:tag VERSION=2.1.14'
    preconditions:
      - sh: '[ -n "{{.VERSION}}" ]'
        msg: "VERSION is required, e.g. task release:tag VERSION=2.1.14"
      - sh: 'git ls-remote --exit-code --heads origin master'
        msg: "Could not reach origin/master"
    cmds:
      - git checkout master
      - git pull origin master
      - git tag v{{.VERSION}}
      - git push origin v{{.VERSION}}

  build:
    desc: Build the package
    cmds:
      - poetry build

  publish:
    desc: Publish the package to PyPI (expects POETRY_PYPI_TOKEN_PYPI to be set)
    deps: [build]
    cmds:
      - poetry publish
